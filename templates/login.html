<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 400px; border-radius: 12px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🔐 Sistema Biblioteca</h2>
            <p class="text-muted small">Insira suas credenciais para acessar</p>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Login</label>
                <input type="text" name="login" class="form-control" placeholder="Seu usuário" required style="border-radius: 8px;">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="••••••••" required style="border-radius: 8px;">
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm" style="border-radius: 8px;">Entrar</button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('novo_usuario_externo') }}" class="text-success text-decoration-none small fw-bold">➕ Novo Usuário</a>
        </div>

        {% if erro %}
            <div class="alert alert-danger text-center mt-3 p-2 small" role="alert" style="border-radius: 8px;">
                {{ erro }}
            </div>
        {% endif %}
    </div>

</body>
</html>
