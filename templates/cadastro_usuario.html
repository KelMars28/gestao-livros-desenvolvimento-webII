<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 400px; border-radius: 12px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-success">👤 Novo Usuário</h2>
            <p class="text-muted small">Cadastre-se para gerenciar seus livros</p>
        </div>
        
        <form action="{{ url_for('salvar_usuario_externo') }}" method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Nome Completo</label>
                <input type="text" name="nome" class="form-control" placeholder="Seu nome" required style="border-radius: 8px;">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Login Escolhido</label>
                <input type="text" name="login" class="form-control" placeholder="Ex: raquel123" required style="border-radius: 8px;">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold text-secondary">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="Crie uma senha" required style="border-radius: 8px;">
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm" style="border-radius: 8px;">Salvar Registros</button>
        </form>

        <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="text-muted text-decoration-none small">Voltar para o Login</a>
        </div>
    </div>

</body>
</html>
