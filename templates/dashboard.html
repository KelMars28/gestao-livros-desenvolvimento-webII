<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BiblioTech - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand fw-bold" href="#">📚 BiblioTech</a>
        <span class="text-white">Olá, <strong class="text-warning">{{ nome_usuario }}</strong> | 
            <a href="/logout" class="btn btn-sm btn-danger ms-2">Sair</a>
        </span>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4 fw-bold text-secondary">📊 Painel Estatístico Geral</h2>
        
        <div class="row g-4 mt-2">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm bg-primary text-white p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase opacity-75">Livros no Acervo</h6>
                            <h1 class="display-4 fw-bold">{{ total_livros }}</h1>
                        </div>
                        <span style="font-size: 3rem;">📖</span>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card border-0 shadow-sm bg-success text-white p-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase opacity-75">Leitores Cadastrados</h6>
                            <h1 class="display-4 fw-bold">{{ total_usuarios }}</h1>
                        </div>
                        <span style="font-size: 3rem;">👤</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5 p-4 bg-white rounded shadow-sm text-center">
            <h4 class="mb-4 fw-bold text-dark">⚙️ Gerenciamento do Acervo</h4>
            <div class="d-flex justify-content-center gap-3">
                <a href="/livros" class="btn btn-lg btn-outline-dark px-4">📋 Visualizar Lista de Livros</a>
                <a href="/livros/novo" class="btn btn-lg btn-primary px-4">➕ Cadastrar Novo Livro</a>
            </div>
        </div>
    </div>

</body>
</html>
